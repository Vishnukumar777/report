# =============================================================================
# Kubernetes Deployment Manifest for Flask CI/CD Application
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-cicd-app
  labels:
    app: flask-cicd-app
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-cicd-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: flask-cicd-app
        version: v1
    spec:
      containers:
        - name: flask-cicd-app
          # IMPORTANT: Replace YOUR_DOCKERHUB_USERNAME with your actual Docker Hub username
          image: YOUR_DOCKERHUB_USERNAME/flask-cicd-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              protocol: TCP
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: APP_VERSION
              value: "1.0.0"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp
      volumes:
        - name: tmp-dir
          emptyDir: {}
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
---
# =============================================================================
# Horizontal Pod Autoscaler (Optional - for scaling based on CPU)
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: flask-cicd-app-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: flask-cicd-app
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
