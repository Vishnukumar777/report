# =============================================================================
# Kubernetes Service Manifest for Flask CI/CD Application
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: flask-cicd-service
  labels:
    app: flask-cicd-app
spec:
  type: NodePort
  selector:
    app: flask-cicd-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30080
