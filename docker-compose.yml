version: '3.8'

services:
  # ==========================================================================
  # Main Application Service
  # ==========================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: flask-cicd-app
    ports:
      - "5000:5000"
    environment:
      - ENVIRONMENT=development
      - APP_VERSION=1.0.0
      - FLASK_DEBUG=false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network

  # ==========================================================================
  # Test Runner Service (for running tests in container)
  # ==========================================================================
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    container_name: flask-cicd-test
    command: pytest tests/ -v --cov=src --cov-report=term-missing
    volumes:
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
    profiles:
      - testing

  # ==========================================================================
  # Development Service (with hot reload)
  # ==========================================================================
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: flask-cicd-dev
    ports:
      - "5000:5000"
    environment:
      - ENVIRONMENT=development
      - APP_VERSION=dev
      - FLASK_DEBUG=true
    volumes:
      - ./src:/app/src
    networks:
      - app-network
    profiles:
      - development

networks:
  app-network:
    driver: bridge
